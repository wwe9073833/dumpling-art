<!DOCTYPE html> 
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結帳清單｜DUMPLING ART</title> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ================= 🛒 DUMPLING ART 結帳清單 (黑化精品版) ================= */
        html { scroll-behavior: smooth; }
        body {
            /* 👉🏼 完美同步：英文優先使用 Helvetica，中文使用思源黑體 */
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Noto Sans TC', sans-serif;
            margin: 0; padding: 0; background-color: #000; color: #fff; line-height: 1.6;
        }

        .navbar {
            background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; border-bottom: 1px solid #222;
        }
        .brand-logo { font-size: 24px; font-weight: bold; letter-spacing: 4px; color: #fff; text-decoration: none; text-transform: uppercase; }
        .nav-links a { text-decoration: none; color: #aaa; margin-left: 25px; font-size: 14px; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .nav-links a:hover { color: #ff3b3b; }

        .section-title { text-align: center; margin: 60px 0 40px; font-size: 28px; font-weight: 300; letter-spacing: 6px; color: #fff; text-transform: uppercase; }
        
        /* 🛒 購物車容器：改成黑色透明與精緻框線 */
        .cart-container {
            max-width: 800px; margin: 0 auto 60px auto; padding: 40px;
            background: transparent; border-radius: 12px; border: 1px solid #222;
        }
        
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px dashed #333; font-size: 16px; letter-spacing: 1px;
        }
        .item-name { font-weight: 300; color: #fff; }
        .item-subtotal { color: #ff3b3b; font-weight: bold; }

        .cart-total {
            text-align: right; font-size: 24px; font-weight: 300; margin-top: 40px; color: #fff; letter-spacing: 2px;
        }

        /* 結帳按鈕：紅色膠囊 */
        .checkout-btn {
            display: block; width: 100%; text-align: center; 
            background-color: #ff3b3b; color: white; padding: 18px; 
            border-radius: 50px; font-size: 16px; font-weight: bold; letter-spacing: 2px;
            text-decoration: none; margin-top: 40px; transition: 0.4s; cursor: pointer; border: 1px solid #ff3b3b;
        }
        .checkout-btn:hover { background-color: transparent; color: #ff3b3b; }

        /* 清空按鈕：黑色膠囊 */
        .clear-btn {
            display: block; width: 100%; text-align: center; 
            background-color: #111; color: #888; padding: 15px; 
            border-radius: 50px; font-size: 14px; font-weight: 300; letter-spacing: 1px;
            text-decoration: none; margin-top: 15px; transition: 0.4s; cursor: pointer; border: 1px solid #333;
        }
        .clear-btn:hover { background-color: #222; color: #fff; border-color: #555; }

        .empty-message { text-align: center; color: #555; font-size: 16px; margin: 40px 0; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; padding: 15px 10px; }
            .brand-logo { font-size: 20px; margin-bottom: 15px; text-align: center; }
            .nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
            .nav-links a { margin: 0 5px; font-size: 13px; }
            .cart-container { padding: 25px; margin: 20px 15px; }
            .cart-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .item-subtotal { align-self: flex-end; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="brand-logo">DUMPLING ART｜官方網站</a> 
        <div class="nav-links">
            <a href="index.html">🏠 繼續逛逛</a>
        </div>
    </nav>

    <div class="cart-container">
        <h2 class="section-title">🛒 你的購物車</h2>
        
        <div id="cart-items"></div>
        
        <div class="cart-total" id="cart-total">總計：NT$ 0</div>

        <button onclick="checkoutViaLine()" class="checkout-btn">📲 傳送訂單給餃子 (LINE)</button>
        <button onclick="clearCart()" class="clear-btn">🗑️ 清空購物車，重新挑選</button>
    </div>

    <script>
        let totalPrice = 0;

        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('dumpling_cart')) || [];
            
            let cartItemsDiv = document.getElementById('cart-items');
            cartItemsDiv.innerHTML = ""; // 先清空畫面
            totalPrice = 0;

            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<div class="empty-message">你的購物車空空的耶，快去挑選喜歡的藝術品吧！🥺</div>';
                document.getElementById('cart-total').innerText = "總計：NT$ 0";
                return;
            }

            // 把商品一個一個印出來
            cart.forEach(item => {
                let subtotal = item.price * item.quantity;
                totalPrice += subtotal;
                
                cartItemsDiv.innerHTML += `
                    <div class="cart-item">
                        <span class="item-name">▪️ ${item.name} (x${item.quantity})</span>
                        <span class="item-subtotal">NT$ ${subtotal}</span>
                    </div>
                `;
            });

            // 更新總金額
            document.getElementById('cart-total').innerText = `總計：NT$ ${totalPrice}`;
        }

        // 清空購物車
        function clearCart() {
            if(confirm("確定要清空購物車嗎？")) {
                localStorage.removeItem('dumpling_cart');
                renderCart(); // 💡 清空後馬上重新整理畫面
                alert("購物車已清空！");
            }
        }

        // 🚀 終極魔法：LINE 自動點餐機
        function checkoutViaLine() {
            let cart = JSON.parse(localStorage.getItem('dumpling_cart')) || [];
            
            if (cart.length === 0) {
                alert("購物車是空的，無法結帳喔！");
                return;
            }

            let message = "老闆你好！這是我要訂購的商品：\n\n";
            
            cart.forEach(item => {
                let subtotal = item.price * item.quantity;
                message += `▪️ ${item.name} x ${item.quantity} (NT$ ${subtotal})\n`;
            });

            message += `\n💰 總金額：NT$ ${totalPrice}\n\n`;
            message += "請協助確認訂單並提供匯款資訊，謝謝！";

            let lineId = "@659jchwf"; 
            let lineUrl = `https://line.me/R/oaMessage/${lineId}/?${encodeURIComponent(message)}`;

            window.location.href = lineUrl;
        }

        // 網頁讀取完畢後，執行顯示購物車
        window.onload = renderCart;
    </script>
</body>
</html>
